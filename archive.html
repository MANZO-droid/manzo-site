<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스레터 아카이브 — 만조</title>
  <meta name="description" content="만조 뉴스레터 지난 호 아카이브" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --bg-card: #FFFFFF; --bg-hero: #EEE9DF;
  --text-primary: #1C1C2E; --text-secondary: #5A5A72; --text-muted: #9494A8;
  --accent: #4A6FA5; --accent-hover: #3A5A90; --accent-light: #EBF0F9;
  --gold: #B5914C; --gold-light: #F5EFE2; --border: #E5E0D8;
  --radius: 12px; --shadow: 0 2px 12px rgba(28,28,46,0.07);
  --font: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --max-w: 1100px; --transition: 0.2s ease;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); line-height: 1.7; font-size: 16px; }
a { color: inherit; text-decoration: none; }
ul { list-style: none; }
.container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
section { padding: 72px 0; }
.nav { position: sticky; top: 0; z-index: 100; background: rgba(247,245,240,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.nav-logo { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-size: 14px; color: var(--text-secondary); font-weight: 500; transition: color var(--transition); }
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-cta { background: var(--accent); color: #fff !important; padding: 8px 18px; border-radius: 20px; font-size: 13px !important; font-weight: 600 !important; }
.nav-cta:hover { background: var(--accent-hover) !important; }
.hero-eyebrow { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); background: var(--gold-light); padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
.section-tag { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.section-title { font-size: clamp(22px,3vw,30px); font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); }
.archive-list { display: flex; flex-direction: column; gap: 16px; }
.archive-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 28px; display: flex; align-items: flex-start; gap: 24px; transition: box-shadow var(--transition); }
.archive-item:hover { box-shadow: var(--shadow); }
.archive-issue { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-light); padding: 4px 12px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
.archive-content { flex: 1; }
.archive-content h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
.archive-content p { font-size: 14px; color: var(--text-secondary); }
.archive-date { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
.subscribe-section { background: var(--accent); color: #fff; }
.subscribe-inner { text-align: center; max-width: 560px; margin: 0 auto; }
.subscribe-inner .section-tag { color: rgba(255,255,255,0.7); }
.subscribe-inner .section-title { color: #fff; }
.subscribe-inner p { color: rgba(255,255,255,0.85); font-size: 16px; margin: 14px 0 32px; }
.subscribe-form { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.subscribe-form input[type="email"] { flex: 1; min-width: 220px; max-width: 320px; padding: 13px 20px; border-radius: 28px; border: none; font-size: 15px; font-family: var(--font); background: rgba(255,255,255,0.15); color: #fff; outline: none; }
.subscribe-form input::placeholder { color: rgba(255,255,255,0.6); }
.subscribe-form input:focus { background: rgba(255,255,255,0.25); }
.btn-white { padding: 13px 24px; background: #fff; color: var(--accent); border: none; border-radius: 28px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; white-space: nowrap; }
.btn-white:hover { opacity: 0.9; }
.subscribe-done { display: none; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.15); border-radius: 28px; padding: 16px 28px; font-size: 16px; font-weight: 600; color: #fff; }
.subscribe-done.show { display: flex; }
.footer { background: var(--text-primary); color: rgba(255,255,255,0.5); padding: 40px 0; }
.footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-logo { font-size: 16px; font-weight: 700; color: #fff; }
.footer-logo span { color: #7AA6D4; }
.footer-copy { font-size: 13px; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; transition: color var(--transition); }
.footer-links a:hover { color: #fff; }
@media (max-width: 768px) {
  section { padding: 52px 0; }
  .nav-links { gap: 16px; } .nav-links a:not(.nav-cta) { display: none; }
  .archive-item { flex-direction: column; gap: 12px; }
  .footer-inner { flex-direction: column; text-align: center; } .footer-links { justify-content: center; }
}
@media (max-width: 480px) {
  .subscribe-form { flex-direction: column; align-items: stretch; }
  .subscribe-form input { max-width: 100%; }
}
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">만조<span>Investment</span></a>
    <ul class="nav-links">
      <li><a href="index.html#articles">분석 글</a></li>
      <li><a href="archive.html" class="active">뉴스레터</a></li>
      <li><a href="index.html#author">필자 소개</a></li>
      <li><a href="index.html#subscribe" class="nav-cta">구독하기</a></li>
    </ul>
  </div>
</nav>

<!-- ARCHIVE HERO -->
<section style="background: var(--bg-hero); padding: 64px 0 52px;">
  <div class="container">
    <span class="hero-eyebrow">Newsletter Archive</span>
    <h1 style="font-size: clamp(24px, 4vw, 40px); font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px;">뉴스레터 지난 호</h1>
    <p style="font-size: 16px; color: var(--text-secondary); max-width: 480px;">
      격주로 발행된 글로벌 경제 분석 뉴스레터입니다.<br />
      지난 호를 자유롭게 열람하세요.
    </p>
  </div>
</section>

<!-- NEWSLETTER LIST -->
<section>
  <div class="container">
    <div class="archive-list" id="archive-list"></div>
  </div>
</section>

<!-- SUBSCRIBE -->
<section class="subscribe-section" id="subscribe">
  <div class="container">
    <div class="subscribe-inner">
      <div class="section-tag">Subscribe</div>
      <h2 class="section-title">다음 호, 놓치지 마세요</h2>
      <p>격주 발행 · 무료 · 언제든 해지 가능</p>
      <form class="subscribe-form" id="archive-subscribe-form">
        <input type="email" id="archive-email" placeholder="이메일 주소 입력" autocomplete="email" required />
        <button type="submit" class="btn-white">구독 신청</button>
      </form>
      <div class="subscribe-done" id="archive-subscribe-done">
        ✅ 신청 완료! 다음 발행일에 뵙겠습니다.
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-logo">만조<span>Investment</span></div>
    <p class="footer-copy">© 2026 만조. 투자 판단은 본인의 책임입니다.</p>
    <ul class="footer-links">
      <li><a href="archive.html">뉴스레터 아카이브</a></li>
      <li><a href="index.html#articles">분석 글</a></li>
    </ul>
  </div>
</footer>

<script>
const NEWSLETTERS = [
  { id: "nl-006", issue: 6, title: "금리 피봇 재연기, 포트폴리오 리밸런싱 전략", date: "2026-06-16", summary: "연준 피봇 기대가 3분기로 밀리며 채권과 성장주에 동시 압박. 이 국면에서 현금 비중과 섹터 배분을 어떻게 조정할지 제안합니다." },
  { id: "nl-005", issue: 5, title: "5월 고용 서프라이즈가 바꾼 시장의 판", date: "2026-06-02", summary: "비농업 고용이 25만 명을 넘어서며 시장은 '노 랜딩' 시나리오를 다시 가격에 반영하기 시작했습니다." },
  { id: "nl-004", issue: 4, title: "AI 인프라 투자 사이클, 어디까지 왔나", date: "2026-05-19", summary: "빅테크의 설비투자(CapEx) 급증이 반도체·전력·냉각 장비 업체로 수혜가 퍼지는 구조를 분석합니다." },
  { id: "nl-003", issue: 3, title: "중국 경기 부양, 실효성 있는가", date: "2026-05-05", summary: "부동산 안정화 패키지와 소비 진작책이 잇따르고 있습니다. 숫자로 보는 중국 내수 회복의 현재 위치." },
  { id: "nl-002", issue: 2, title: "달러 인덱스 104 돌파, 신흥국 자금 이탈 경보", date: "2026-04-21", summary: "DXY가 104를 넘으며 신흥국 통화·채권에서 자금이 빠져나가고 있습니다. 한국 시장에 미치는 직접 영향을 정리합니다." },
  { id: "nl-001", issue: 1, title: "창간호: 왜 차트를 함께 읽어야 하는가", date: "2026-04-07", summary: "데이터를 직접 읽으면 소음과 신호를 구분할 수 있습니다. 이 뉴스레터가 지향하는 분석 방식을 소개합니다." },
];
</script>
<script>
  const STORAGE_KEY = 'manzo_subscribed';

  function renderArchive() {
    document.getElementById('archive-list').innerHTML = NEWSLETTERS.map(nl => `
      <div class="archive-item">
        <span class="archive-issue">Vol.${nl.issue}</span>
        <div class="archive-content">
          <h3>${nl.title}</h3>
          <p>${nl.summary}</p>
          <p class="archive-date">📅 ${nl.date}</p>
        </div>
      </div>
    `).join('');
  }

  function applySubscribeState() {
    if (!localStorage.getItem(STORAGE_KEY)) return;
    document.getElementById('archive-subscribe-form').style.display = 'none';
    document.getElementById('archive-subscribe-done').classList.add('show');
  }

  document.getElementById('archive-subscribe-form').addEventListener('submit', function (e) {
    e.preventDefault();
    localStorage.setItem(STORAGE_KEY, document.getElementById('archive-email').value || 'subscribed');
    applySubscribeState();
  });

  renderArchive();
  applySubscribeState();
</script>
</body>
</html>
