  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --bg-card: #FFFFFF; --bg-hero: #EEE9DF;
  --text-primary: #1C1C2E; --text-secondary: #5A5A72; --text-muted: #9494A8;
  --accent: #4A6FA5; --accent-hover: #3A5A90; --accent-light: #EBF0F9;
  --gold: #B5914C; --gold-light: #F5EFE2; --border: #E5E0D8;
  --tag-국내: #E8F4EE; --tag-국내-text: #2E7D52;
  --tag-해외: #EBF0F9; --tag-해외-text: #2E5282;
  --tag-지표: #FDF4E7; --tag-지표-text: #8A6020;
  --tag-volume: #FEF0F0; --tag-volume-text: #991B1B;
  --radius: 12px; --shadow: 0 2px 12px rgba(28,28,46,0.07); --shadow-hover: 0 6px 24px rgba(28,28,46,0.12);
  --font: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --max-w: 1100px; --transition: 0.2s ease;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); line-height: 1.7; font-size: 16px; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
ul { list-style: none; }
.container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }
.nav { position: sticky; top: 0; z-index: 100; background: rgba(247,245,240,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
.nav-logo { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-size: 14px; color: var(--text-secondary); font-weight: 500; transition: color var(--transition); }
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-cta { background: var(--accent); color: #fff !important; padding: 8px 18px; border-radius: 20px; font-size: 13px !important; font-weight: 600 !important; }
.nav-cta:hover { background: var(--accent-hover) !important; }
.article-detail { padding: 56px 0 80px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); margin-bottom: 36px; transition: color var(--transition); }
.back-link:hover { color: var(--accent); }
.article-header { margin-bottom: 36px; }
.article-header h1 { font-size: clamp(22px,3.5vw,36px); font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 16px; }
.article-meta { display: flex; gap: 16px; font-size: 14px; color: var(--text-muted); flex-wrap: wrap; }
.tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 10px; margin-bottom: 16px; }
.tag-국내 { background: #E8F4EE; color: #2E7D52; }
.tag-해외 { background: #EBF0F9; color: #2E5282; }
.tag-지표 { background: #FDF4E7; color: #8A6020; }
.tag-거래대금-상위 { background: var(--tag-volume); color: var(--tag-volume-text); }
.article-chart-placeholder { width: 100%; aspect-ratio: 16/7; background: var(--bg-hero); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 40px; }
.article-chart-placeholder svg { width: 100%; height: 100%; display: block; }
.article-body { font-size: 17px; line-height: 1.9; color: var(--text-primary); max-width: 720px; }
.article-body h3 { font-size: 20px; font-weight: 700; margin: 36px 0 12px; color: var(--text-primary); }
.article-body p { margin-bottom: 20px; }
.article-body ul { list-style: disc; padding-left: 24px; margin-bottom: 20px; }
.article-body li { margin-bottom: 8px; }
.article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 40px; }
.article-tag-chip { font-size: 13px; color: var(--text-secondary); background: var(--bg-hero); border: 1px solid var(--border); padding: 4px 14px; border-radius: 20px; }
.section-tag { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.section-title { font-size: clamp(22px,3vw,30px); font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); }
.section-header { margin-bottom: 24px; }
.articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
.article-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: box-shadow var(--transition), transform var(--transition); cursor: pointer; display: flex; flex-direction: column; }
.article-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
.article-card-img { width: 100%; aspect-ratio: 16/9; background: var(--bg-hero); overflow: hidden; border-bottom: 1px solid var(--border); }
.article-card-img svg { width: 100%; height: 100%; display: block; }
.article-card-body { padding: 22px; flex: 1; display: flex; flex-direction: column; }
.article-card h3 { font-size: 17px; font-weight: 700; line-height: 1.45; letter-spacing: -0.2px; margin-bottom: 10px; color: var(--text-primary); }
.article-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; flex: 1; }
.article-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.article-date { font-size: 13px; color: var(--text-muted); }
.read-more { font-size: 13px; font-weight: 600; color: var(--accent); }
.btn-primary { padding: 13px 24px; background: var(--accent); color: #fff; border: none; border-radius: 28px; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: background var(--transition); white-space: nowrap; }
.btn-primary:hover { background: var(--accent-hover); }
.stock-section { margin-top: 52px; padding: 28px 32px; background: var(--bg-hero); border-radius: var(--radius); border: 1px solid var(--border); max-width: 720px; }
.stock-section-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.stock-info-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.stock-name { font-size: 20px; font-weight: 800; color: var(--text-primary); }
.stock-code { font-size: 12px; color: var(--text-muted); background: var(--border); padding: 2px 8px; border-radius: 4px; }
.stock-price { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-left: auto; }
.stock-change { font-size: 14px; font-weight: 700; }
.stock-up { color: #C0392B; }
.stock-down { color: #2470B3; }
.stock-trade { font-size: 13px; color: var(--text-muted); }
.stock-chart-wrap { width: 100%; aspect-ratio: 16/5; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
.stock-chart-wrap svg { width: 100%; height: 100%; display: block; }
.stock-briefing { font-size: 15px; line-height: 1.85; color: var(--text-secondary); }
.footer { background: var(--text-primary); color: rgba(255,255,255,0.5); padding: 40px 0; }
.footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.footer-logo { font-size: 16px; font-weight: 700; color: #fff; }
.footer-logo span { color: #7AA6D4; }
.footer-copy { font-size: 13px; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; transition: color var(--transition); }
.footer-links a:hover { color: #fff; }
@media (max-width: 768px) {
  .nav-links { gap: 16px; } .nav-links a:not(.nav-cta) { display: none; }
  .footer-inner { flex-direction: column; text-align: center; } .footer-links { justify-content: center; }
}
  </style>
</head>

        ✅ 구독 신청이 완료되었습니다!

<script>
const ARTICLES = [
  { id: "1", title: "미국 장기금리 재상승, 증시는 어디로 가나", category: "해외", date: "2026-06-18", summary: "10년물 국채금리가 다시 4.5%를 돌파하며 성장주에 압박을 주고 있습니다.", body: `<p>미국 10년물 국채금리가 2026년 6월 기준 다시 4.5%를 상회하며 증시 전반에 부담을 주고 있습니다.</p><p>연초만 해도 시장은 연준이 상반기 중 금리를 내릴 것으로 기대했지만, 고용 지표가 예상을 웃도는 수준을 유지하면서 '고금리 장기화(Higher for Longer)' 시나리오가 다시 부상했습니다.</p><h3>섹터별 영향</h3><ul><li><strong>성장주(기술·바이오):</strong> 할인율 상승 → 미래 현금흐름 현재가치 하락. 멀티플 압축 가능성.</li><li><strong>금융주:</strong> 예대마진 확대 수혜. 단, 대출 부실 리스크도 동반 상승.</li><li><strong>유틸리티·리츠:</strong> 채권 대체재 성격으로 금리 상승 시 상대적 약세.</li></ul><h3>투자 시사점</h3><p>단기적으로는 현금흐름이 검증된 가치주·배당주 비중을 높이는 전략이 유효합니다. 기술주는 실적 시즌 결과를 확인한 뒤 선별적으로 접근하는 것이 합리적입니다.</p>`, chartAlt: "미국 10년물 국채금리 추이 차트", tags: ["금리", "연준", "성장주"], author: "만조",
    topStock: { name:"SK하이닉스", code:"000660", price:194500, change:-3200, changePct:-1.62, tradeAmount:"2조 1,340억", intraday:[198200,197100,196400,195800,196200,195300,194900,195100,194700,194500,194500], briefing:"미국 금리 재상승 우려에 반도체 대형주 중심으로 기관 매도세가 집중됐습니다. SK하이닉스는 장중 한때 -2% 이상 하락했으나 낙폭을 일부 회복하며 마감했습니다. HBM 수요 전망은 유지되나 단기 금리 민감도가 높아 추가 조정 가능성을 열어둬야 합니다." } },
  { id: "2", title: "코스피 박스권 탈출 조건 세 가지", category: "국내", date: "2026-06-15", summary: "2,500~2,700 사이를 오가는 코스피. 상단 돌파를 위해 선행되어야 할 거시·수급·실적 조건을 정리합니다.", body: `<p>코스피는 2025년 하반기부터 2,500~2,700 박스권에 갇혀 있습니다.</p><h3>탈출 조건 1: 원/달러 환율 안정</h3><p>환율이 1,350원 이하로 안착해야 외국인 자금의 지속적 유입이 가능합니다.</p><h3>탈출 조건 2: 반도체 업황 본격 회복</h3><p>삼성전자·SK하이닉스 합산 시가총액이 코스피의 약 20%를 차지합니다. HBM 수요 확대와 메모리 가격 반등이 확인되어야 합니다.</p><h3>탈출 조건 3: 밸류업 프로그램 실효성 확인</h3><p>정부의 기업 밸류업 프로그램이 자사주 소각·배당 확대로 이어지는 사례가 누적되어야 PBR 0.8 미만 종목군의 재평가가 본격화됩니다.</p>`, chartAlt: "코스피 주간 차트", tags: ["코스피", "환율", "반도체"], author: "만조",
    topStock: { name:"삼성전자", code:"005930", price:78400, change:1200, changePct:1.55, tradeAmount:"1조 8,920억", intraday:[77200,77500,77900,78100,77800,78000,78300,78500,78200,78600,78400], briefing:"외국인이 사흘 만에 순매수로 전환하며 삼성전자 거래대금이 코스피 전체 1위를 기록했습니다. 달러 약세 전환 기대와 HBM 신규 수주 기대감이 매수세를 이끌었습니다. 단기 저항선인 79,000원 돌파 여부가 다음 관전 포인트입니다." } },
  { id: "3", title: "PCE·CPI 동시 둔화, 인플레이션 정말 잡혔나", category: "지표", date: "2026-06-10", summary: "5월 PCE와 CPI 모두 예상치를 하회했습니다. 숫자 너머에 있는 항목별 세부 데이터를 들여다봅니다.", body: `<p>2026년 5월 미국 PCE 물가지수는 전년 대비 2.4% 상승, CPI는 2.9%로 모두 예상치를 소폭 하회했습니다.</p><h3>둔화를 이끈 항목</h3><ul><li>에너지: 유가 하락으로 전월 대비 -1.2%</li><li>중고차: 공급 정상화로 가격 하락 지속</li></ul><h3>여전히 끈적한 항목</h3><ul><li>주거비(Shelter): 전년 대비 +5.1%, 여전히 상승세</li><li>서비스 물가(ex. 주거): +3.8%, 임금과 연동되어 쉽게 내려오지 않음</li></ul><h3>결론</h3><p>서비스·주거 물가의 점착성이 연준의 조기 금리 인하를 막는 핵심 변수입니다.</p>`, chartAlt: "미국 CPI·PCE 항목별 기여도 차트", tags: ["CPI", "PCE", "연준", "인플레이션"], author: "만조",
    topStock: { name:"POSCO홀딩스", code:"004360", price:412000, change:15500, changePct:3.91, tradeAmount:"1조 5,670억", intraday:[396500,400200,403800,406500,408200,410100,411500,412800,412200,413500,412000], briefing:"인플레이션 둔화 확인에 따른 금리 인하 기대감이 소재·철강주로 자금을 끌어들였습니다. POSCO홀딩스는 2차전지 소재 부문 실적 개선 기대와 맞물려 강한 매수세를 형성했습니다. 420,000원 저항선을 단기 목표로 설정할 수 있습니다." } },
  { id: "4", title: "일본 엔화 약세 심화, 아시아 증시 파급 경로", category: "해외", date: "2026-06-05", summary: "달러/엔이 158엔을 돌파했습니다. 일본은행의 개입 한계와 아시아 이웃 증시에 미치는 영향을 분석합니다.", body: `<p>달러/엔 환율이 158엔을 돌파하며 2024년 이후 최고치를 경신했습니다.</p><h3>엔화 약세의 구조적 배경</h3><p>일본과 미국의 금리 차이(일본 0.5% vs 미국 5.25%)가 엔 캐리 트레이드의 동인입니다.</p><h3>아시아 증시 파급 경로</h3><ul><li><strong>한국:</strong> 원화 동반 약세 → 수입물가 상승 압력, 외국인 자금 유출 우려</li><li><strong>중국:</strong> 위안화 절하 경쟁 자제 의지 있으나 수출 경쟁력 우위 희석</li><li><strong>일본 수출주:</strong> 단기 실적 개선 수혜, 단 BOJ 긴축 가능성 리스크</li></ul>`, chartAlt: "달러/엔 환율 주간 차트", tags: ["엔화", "일본", "환율", "아시아"], author: "만조",

  function makeLineSVG(d, w, h) {
    const pL=42,pR=20,pT=22,pB=30,cw=w-pL-pR,ch=h-pT-pB,n=d.points.length;

    const pathD=d.points.map((v,i)=>`${i?'L':'M'}${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');

    const last=d.points[n-1];
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">

  function makeBarSVG(d, w, h) {
    const pL=44,pR=16,pT=30,pB=32,cw=w-pL-pR,ch=h-pT-pB,n=d.pointsA.length;

    const barsB=d.pointsB.map((v,i)=>`<rect x="${(bx(i)+bW+gap).toFixed(1)}" y="${by(v).toFixed(1)}" width="${bW.toFixed(1)}" height="${bh(v).toFixed(1)}" fill="${d.colorB}" opacity="0.85" rx="2"/>`).join('');
    const grid=[0.25,0.5,0.75,1].map(f=>{const y=pT+ch*(1-f),val=(d.yMin+(d.yMax-d.yMin)*f).toFixed(0);return `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${w-pR}" y2="${y.toFixed(1)}" stroke="#ddd8ce" stroke-width="1"/><text x="${pL-4}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="10" fill="#9494A8">${val}</text>`;}).join('');

      ${grid}${barsA}${barsB}${xlbls}${legend}
    </svg>`;

  function seededRNG(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 0xFFFFFFFF; };
  }

  function genOHLC(seed, startPrice, n) {
    const rng = seededRNG(seed);
    const data = []; let price = startPrice;
    for (let i = 0; i < n; i++) {
      const drift = (rng() - 0.485) * 0.028;
      const vol = rng() * 0.012 + 0.006;
      const open = price;
      const close = price * (1 + drift);
      const hiExtra = rng() * vol; const loExtra = rng() * vol;
      const high = Math.max(open, close) * (1 + hiExtra);
      const low  = Math.min(open, close) * (1 - loExtra);
      data.push([open, high, low, close]);
      price = close;
    }
    return data;
  }

  function makeCandleSVG(ohlc, w, h, label) {
    const pL=56, pR=16, pT=22, pB=26, cw=w-pL-pR, ch=h-pT-pB, n=ohlc.length;
    const slot=cw/n, bW=Math.max(1, slot*0.65);
    const yMin=Math.min(...ohlc.map(c=>c[2]))*0.997, yMax=Math.max(...ohlc.map(c=>c[1]))*1.003;
    const py=v=>pT+ch-((v-yMin)/(yMax-yMin))*ch, cx=i=>pL+(i+0.5)*slot;
    const candles=ohlc.map((c,i)=>{
      const [o,hi,lo,cl]=c, isUp=cl>=o;
      const color=isUp?'#C0392B':'#2470B3', x=cx(i).toFixed(1);
      const bTop=py(Math.max(o,cl)), bBot=py(Math.min(o,cl)), bH=Math.max(1,bBot-bTop);
      return `<line x1="${x}" y1="${py(hi).toFixed(1)}" x2="${x}" y2="${py(lo).toFixed(1)}" stroke="${color}" stroke-width="0.8"/>
      <rect x="${(cx(i)-bW/2).toFixed(1)}" y="${bTop.toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${color}"/>`;
    }).join('');
    const grid=[0,0.25,0.5,0.75,1].map(f=>{
      const val=yMin+(yMax-yMin)*f, y=py(val);
      return `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${w-pR}" y2="${y.toFixed(1)}" stroke="#ddd8ce" stroke-width="0.8"/>
      <text x="${pL-4}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#9494A8">${(val/1000).toFixed(0)}K</text>`;
    }).join('');
    const step=Math.ceil(n/6);
    const xlbls=Array.from({length:7},(_,i)=>{const idx=Math.min(i*step,n-1);return `<text x="${cx(idx).toFixed(1)}" y="${h-5}" text-anchor="middle" font-size="9" fill="#9494A8">${idx+1}일</text>`;}).join('');
    const lbl=label?`<text x="${pL}" y="${pT-6}" font-size="10" fill="#5A5A72" font-weight="600">${label}</text>`:'';
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
      <rect width="${w}" height="${h}" fill="#EEE9DF"/>
      ${grid}${candles}${xlbls}${lbl}
    </svg>`;
  }

  function getChartSVG(id, size) {
    const d=CHART_DATA[id]; if(!d) return '';
    const w=size==='detail'?700:400, h=size==='detail'?280:225;
    if (d.type === 'candle') {
      const showN = size==='detail' ? d.n : Math.min(60, d.n);
      const ohlc = genOHLC(d.seed, d.startPrice, d.n).slice(-showN);
      return makeCandleSVG(ohlc, w, h, size==='detail' ? d.label : '');
    }
    return d.type==='bar2' ? makeBarSVG(d,w,h) : makeLineSVG(d,w,h);
  }

  function makeIntradaySVG(intraday, changePct) {
    const w=700, h=200;
    const isUp = changePct >= 0;
    const color = isUp ? '#C0392B' : '#2470B3';
    const fill = isUp ? 'rgba(192,57,43,0.08)' : 'rgba(36,112,179,0.08)';
    const pL=52, pR=16, pT=18, pB=30, cw=w-pL-pR, ch=h-pT-pB, n=intraday.length;
    const yMin=Math.min(...intraday)*0.9985, yMax=Math.max(...intraday)*1.0015;
    const px=i=>pL+(i/(n-1))*cw, py=v=>pT+ch-((v-yMin)/(yMax-yMin))*ch;
    const pathD=intraday.map((v,i)=>`${i?'L':'M'}${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
    const fillD=`${pathD} L${px(n-1).toFixed(1)},${(pT+ch).toFixed(1)} L${pL},${(pT+ch).toFixed(1)} Z`;
    const openY=py(intraday[0]);
    const openLine=`<line x1="${pL}" y1="${openY.toFixed(1)}" x2="${w-pR}" y2="${openY.toFixed(1)}" stroke="#9494A8" stroke-width="1" stroke-dasharray="4,3"/>`;
    const times=['9:00','10:00','11:00','12:00','13:00','14:00','15:30'];
    const tIdx=[0,Math.floor(n*0.18),Math.floor(n*0.36),Math.floor(n*0.54),Math.floor(n*0.64),Math.floor(n*0.82),n-1];
    const xlbls=times.map((t,i)=>`<text x="${px(tIdx[i]).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="9" fill="#9494A8">${t}</text>`).join('');
    const grid=[0,0.5,1].map(f=>{
      const val=yMin+(yMax-yMin)*f, y=py(val);
      return `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${w-pR}" y2="${y.toFixed(1)}" stroke="#ddd8ce" stroke-width="1"/>
      <text x="${pL-4}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#9494A8">${Math.round(val).toLocaleString('ko-KR')}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
      <rect width="${w}" height="${h}" fill="#EEE9DF"/>
      ${grid}${openLine}
      <path d="${fillD}" fill="${fill}"/>
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${px(n-1).toFixed(1)}" cy="${py(intraday[n-1]).toFixed(1)}" r="3.5" fill="${color}"/>
      ${xlbls}
    </svg>`;
  }

  function getArticleId() {
    return new URLSearchParams(location.search).get('id');
  }

  function renderArticle(article) {
    document.title = `${article.title} — 만조`;
    const s = article.topStock;
    const stockHTML = s ? `
      <div class="stock-section">
        <div class="stock-section-eyebrow">오늘의 거래대금 1위 종목</div>
        <div class="stock-info-row">
          <span class="stock-name">${s.name}</span>
          <span class="stock-code">${s.code}</span>
          <span class="stock-price">${s.price.toLocaleString('ko-KR')}원</span>
          <span class="stock-change ${s.changePct >= 0 ? 'stock-up' : 'stock-down'}">${s.changePct >= 0 ? '▲' : '▼'}${Math.abs(s.change).toLocaleString('ko-KR')}원 (${Math.abs(s.changePct).toFixed(2)}%)</span>
          <span class="stock-trade">거래대금 ${s.tradeAmount}</span>
        </div>
        <div class="stock-chart-wrap">${makeIntradaySVG(s.intraday, s.changePct)}</div>
        <p class="stock-briefing">${s.briefing}</p>
      </div>` : '';
    document.getElementById('article-content').innerHTML = `
      <div class="article-header">
        <span class="tag tag-${article.category.replace(/\s+/g,'-')}">${article.category}</span>
        <h1>${article.title}</h1>
        <div class="article-meta">
          <span>📅 ${article.date}</span>
          <span>✍️ ${article.author}</span>
          ${article.tags.map(t => `<span>#${t}</span>`).join('')}
        </div>
      </div>
      <div class="article-chart-placeholder">${getChartSVG(article.id,'detail')}</div>
      <div class="article-body">${article.body}</div>
      <div class="article-tags">
        ${article.tags.map(t => `<span class="article-tag-chip">#${t}</span>`).join('')}
      </div>
      ${stockHTML}
    `;
  }

  function renderRelated(currentId) {
    const related = ARTICLES.filter(a => a.id !== currentId).slice(0, 3);
    document.getElementById('related-grid').innerHTML = related.map(a => `
      <article class="article-card" onclick="location.href='article.html?id=${a.id}'">
        <div class="article-card-img">${getChartSVG(a.id,'card')}</div>
        <div class="article-card-body">
          <span class="tag tag-${a.category.replace(/\s+/g,'-')}">${a.category}</span>
          <h3>${a.title}</h3>
          <p>${a.summary}</p>
          <div class="article-card-footer">
            <span class="article-date">${a.date}</span>
            <span class="read-more">자세히 읽기 →</span>
          </div>
        </div>
      </article>
    `).join('');
  }

  function applySubscribeState() {
    if (!localStorage.getItem(STORAGE_KEY)) return;
    document.getElementById('article-subscribe-form').style.display = 'none';
    const done = document.getElementById('article-subscribe-done');
    done.style.display = 'flex';
  }

  document.getElementById('article-subscribe-form').addEventListener('submit', function (e) {
    e.preventDefault();
    localStorage.setItem(STORAGE_KEY, document.getElementById('article-email').value || 'subscribed');
    applySubscribeState();
  });

  // Init
  const id = getArticleId();
  const article = ARTICLES.find(a => a.id === id);
  if (article) {
    renderArticle(article);
    renderRelated(id);
  } else {
    document.getElementById('article-content').innerHTML = '<p>글을 찾을 수 없습니다. <a href="index.html">목록으로 돌아가기</a></p>';
  }

  applySubscribeState();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function () {});
  });
}
</script>
</body>
