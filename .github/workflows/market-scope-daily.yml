name: "마켓 스코프 자동 업데이트"

# 기존에는 scripts/collect_market_scope.py가 Cowork "Scheduled Task"(Anthropic
# 데스크톱 앱의 예약 작업, market-scope-daily-update, 매일 새벽 5시 로컬시간)로만
# 실행됐습니다. 이 방식은 Cowork 앱이 그 시각에 켜져 있어야만 정확히 동작하고,
# 앱이 꺼져 있으면 다음에 앱을 열 때까지 실행이 지연됩니다(실제로 "예정된 새벽
# 5시 실행이 지연되어 당일 장마감 뉴스까지 반영" 같은 커밋 메시지가 반복 발생).
# 이 워크플로우는 그 대체/보완으로 GitHub Actions에서 매일 자동 실행되도록 합니다.
#
# scripts/collect_market_scope.py를 인자 없이("오늘" 기준) 실행하면 내부적으로
# scripts/krx_calendar.py(is_trading_day)로 오늘이 KRX 개장일인지 확인해,
# 개장일이 아니면 리포트를 만들지 않고 조용히 종료합니다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions에서 등록):
#   - GEMINI_API_KEY : Google Gemini API 키 (사람이 직접 등록해야 함)

on:
  schedule:
    # 매일 20:00 UTC = 05:00 KST(다음날). 개장일이 아니면 스크립트 내부에서
    # 자동으로 스킵되므로 요일 조건 없이 매일 호출한다.
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect-market-scope:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4 google-generativeai

      - name: 마켓 스코프 수집 (개장일에만 실제 리포트 생성)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/collect_market_scope.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market-scope-data.json
          git diff --cached --quiet || git commit -m "data: 마켓 스코프 자동 업데이트 ($(date -u +%Y-%m-%d))"
          git push
